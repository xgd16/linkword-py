server:
  host: "0.0.0.0"   # 监听地址，0.0.0.0 表示所有网卡
  port: 9902
  workers: 3         # 工作进程数
  reload: true      # 开发时可设为 true 启用热重载

log:
  level: INFO        # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"

# dmxapi / OpenAI 兼容 API 配置
ai:
  dmxapi:
    baseUrl: "https://www.dmxapi.cn/v1"
    model: "gpt-5-mini"
    # apiKey 支持环境变量 AI_API_KEY 或 DMXAPI_API_KEY，也可在此配置
    apiKey: "sk-yWSdWNOzilCBsRHnIiZMdwk4ZPyycOAXvUeU6nP5Dr2FKM7a"
  # 向量检索 Embedding 模型配置（OpenAI 兼容 /embeddings）
  embedding:
    baseUrl: "https://www.dmxapi.cn/v1"
    model: "text-embedding-3-small"
    # apiKey 支持环境变量 AI_EMBEDDING_API_KEY -> AI_API_KEY -> DMXAPI_API_KEY，也可在此配置
    apiKey: "sk-yWSdWNOzilCBsRHnIiZMdwk4ZPyycOAXvUeU6nP5Dr2FKM7a"
    # 可选；留空时首次建库会自动探测维度
    dimensions: 0
    batchSize: 32
    timeout: 120
  # 联网搜索（DuckDuckGo）：文章/链接 AI 填表时可由模型自主调用 internet_search
  webSearch:
    enabled: true       # false 则退回纯模型、不发起搜索
    maxResults: 6       # 单次搜索返回条数上限
    maxToolRounds: 4    # 模型连续多轮调搜索的上限，防止死循环
  # 文章配图生成：OpenAI 兼容 /images/generations，保存到 admin/public/upload/covers
  imageGen:
    model: "doubao-seedream-4-5-251128"  # 可用 dall-e-3、dall-e-2、doubao-seedream-4-5-251128、doubao-seedream-5-0-lite
    # 配图保存目录：Go admin 的 public/upload/covers（需 py_server 可写，同机部署用绝对路径）
    outputDir: "../admin/public/upload/covers"
    # 轮播图保存目录（可选，不填则在 covers 同级自动使用 banners）
    bannerOutputDir: "../admin/public/upload/banners"
    
    # outputDir: "/www/wwwroot/linkword_go_service/public/upload/covers"
    # # 轮播图保存目录（可选，不填则在 covers 同级自动使用 banners）
    # bannerOutputDir: "/www/wwwroot/linkword_go_service/public/upload/banners"

# zvec 导航向量库配置
navVector:
  collectionPath: "./data/zvec/nav_links"
  collectionName: "nav_links"
  metricType: "COSINE"   # COSINE | IP | L2
  batchSize: 32
  searchMaxResults: 800  # 单次搜索最多拉取多少候选，用于分页切片
  defaultTopK: 120       # 未指定时的候选数
